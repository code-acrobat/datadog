version: '3.8'

services:
  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    container_name: datadog-agent
    environment:
      # EU instance configuration
      DD_SITE: datadoghq.eu
      DD_API_KEY: ${DD_API_KEY}
      
      # Agent hostname and tags
      DD_HOSTNAME: datadog-agent-docker
      DD_TAGS: env:demo,service:python-apm-demo,version:1.0.0
      
      # Container monitoring
      DD_CONTAINER_EXCLUDE: "false"
      DD_CONTAINER_EXCLUDE_METRICS: "false"
      
      # APM configuration
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      
      # Logs configuration
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      
      # Live container monitoring
      DD_LIVE_CONTAINER_COLLECTION_ENABLED: "true"
    ports:
      - "8126:8126/tcp"  # APM traces
      - "8125:8125/udp"  # Statsd metrics
      - "5000:5000/tcp"  # Agent API
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgudroup:ro
      - /etc/passwd:/etc/passwd:ro
    networks:
      - datadog-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  python-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-apm-demo
    environment:
      # Datadog APM configuration
      DD_SERVICE: python-apm-demo
      DD_ENV: demo
      DD_VERSION: 1.0.0
      DD_TRACE_ENABLED: "true"
      DD_LOGS_INJECTION: "true"
      
      # Point to Datadog agent container
      DD_AGENT_HOST: datadog-agent
      DD_TRACE_AGENT_PORT: 8126
      DD_STATSD_HOST: datadog-agent
      DD_STATSD_PORT: 8125
      
      # EU instance configuration
      DD_SITE: datadoghq.eu
      
      # Logging configuration
      DD_LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      datadog-agent:
        condition: service_healthy
    networks:
      - datadog-net
    labels:
      com.datadoghq.ad.logs: '[{"source": "python", "service": "python-apm-demo", "tags": ["env:demo"]}]'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  datadog-net:
    driver: bridge
